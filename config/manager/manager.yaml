apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocm-managed-serviceaccount-replicaset-controller
  labels:
    app.kubernetes.io/name: ocm-managed-serviceaccount-replicaset-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ocm-managed-serviceaccount-replicaset-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ocm-managed-serviceaccount-replicaset-controller
    spec:
      serviceAccountName: ocm-managed-serviceaccount-replicaset-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/appthrust/ocm-managed-serviceaccount-replicaset-controller:dev
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --leader-elect
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi

