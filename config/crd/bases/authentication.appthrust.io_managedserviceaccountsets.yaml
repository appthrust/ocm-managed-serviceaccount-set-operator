---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: managedserviceaccountsets.authentication.appthrust.io
spec:
  group: authentication.appthrust.io
  names:
    kind: ManagedServiceAccountSet
    listKind: ManagedServiceAccountSetList
    plural: managedserviceaccountsets
    shortNames:
    - msaset
    singular: managedserviceaccountset
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ManagedServiceAccountSet declares one managed service account intent across
          OCM Placement-selected managed clusters.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ManagedServiceAccountSetSpec declares one OCM managed-serviceaccount intent
              across clusters selected by OCM Placement.
            properties:
              managedServiceAccount:
                description: ManagedServiceAccount describes generated OCM ManagedServiceAccount
                  children.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: |-
                      Annotations are copied to generated ManagedServiceAccount children after
                      reserved annotations are removed by validation/defaulting.
                    type: object
                  credentialPublication:
                    description: |-
                      CredentialPublication controls whether generated credentials are synced
                      to OCM ClusterProfile namespaces.
                    enum:
                    - None
                    - ClusterProfile
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: |-
                      Labels are copied to generated ManagedServiceAccount children after
                      reserved labels are removed by validation/defaulting.
                    type: object
                  name:
                    description: |-
                      Name is the generated ManagedServiceAccount name in every selected
                      managed cluster namespace.
                    maxLength: 63
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  rotation:
                    description: Rotation mirrors upstream ManagedServiceAccount rotation
                      settings.
                    properties:
                      enabled:
                        default: true
                        description: Enabled prescribes whether token rotation is
                          enabled.
                        type: boolean
                      validity:
                        description: Validity is the requested token validity duration.
                        type: string
                    type: object
                required:
                - credentialPublication
                - name
                type: object
              placement:
                description: Placement creates an owned same-namespace OCM Placement.
                properties:
                  clusterSets:
                    description: ClusterSets are OCM ManagedClusterSets selected by
                      the generated Placement.
                    items:
                      type: string
                    minItems: 1
                    type: array
                    x-kubernetes-list-type: set
                  selector:
                    description: Selector subselects ManagedClusters by label after
                      cluster set selection.
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                required:
                - clusterSets
                type: object
              placementRef:
                description: PlacementRef references an existing same-namespace OCM
                  Placement.
                properties:
                  name:
                    description: Name is the referenced Placement name.
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              remotePermissions:
                description: RemotePermissions selects reviewed permission profiles
                  to deliver by ManifestWork.
                properties:
                  enabled:
                    default: false
                    description: Enabled enables remote permission delivery by ManifestWork.
                    type: boolean
                  profileRefs:
                    description: ProfileRefs name reviewed permission profiles installed
                      with the operator.
                    items:
                      description: PermissionProfileReference names a reviewed remote
                        RBAC profile.
                      properties:
                        name:
                          description: Name is the permission profile name.
                          enum:
                          - aws-workload-identity-selfhosted-irsa
                          maxLength: 63
                          minLength: 1
                          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                          type: string
                      required:
                      - name
                      type: object
                    minItems: 1
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  remoteServiceAccountNamespace:
                    default: open-cluster-management-managed-serviceaccount
                    description: |-
                      RemoteServiceAccountNamespace is the namespace used by the upstream
                      managed-serviceaccount add-on on managed clusters.
                    maxLength: 63
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                type: object
                x-kubernetes-validations:
                - message: spec.remotePermissions.profileRefs is required when remote
                    permissions are enabled
                  rule: '!self.enabled || (has(self.profileRefs) && size(self.profileRefs)
                    > 0)'
            required:
            - managedServiceAccount
            type: object
          status:
            description: ManagedServiceAccountSetStatus summarizes fan-out state without
              credential material.
            properties:
              appliedClusterCount:
                format: int32
                type: integer
              clusters:
                description: |-
                  Clusters is a bounded diagnostic list of the first selected clusters. It
                  must not contain token Secret names, token data, kubeconfig data, or
                  credential material.
                items:
                  description: ClusterSummary reports non-secret per-cluster state.
                  properties:
                    clusterName:
                      minLength: 1
                      type: string
                    managedServiceAccountRef:
                      description: |-
                        ChildObjectReference identifies a generated child object without exposing
                        credential material.
                      properties:
                        name:
                          minLength: 1
                          type: string
                        namespace:
                          minLength: 1
                          type: string
                      required:
                      - name
                      - namespace
                      type: object
                    phase:
                      enum:
                      - Pending
                      - Ready
                      - Conflict
                      - Failed
                      - Deleting
                      type: string
                    reason:
                      type: string
                  required:
                  - clusterName
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - clusterName
                x-kubernetes-list-type: map
              conditions:
                description: Conditions summarize placement, child, remote permission,
                  cleanup, and ready state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              conflictCount:
                format: int32
                type: integer
              desiredClusterCount:
                format: int32
                type: integer
              failedClusters:
                description: |-
                  FailedClusters is a bounded diagnostic list. It must not contain token
                  Secret names, token data, kubeconfig data, or credential material.
                items:
                  description: ClusterFailure reports a bounded per-cluster failure
                    reason.
                  properties:
                    clusterName:
                      minLength: 1
                      type: string
                    message:
                      type: string
                    reason:
                      minLength: 1
                      type: string
                  required:
                  - clusterName
                  - reason
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - clusterName
                x-kubernetes-list-type: map
              failureCount:
                format: int32
                type: integer
              observedGeneration:
                format: int64
                type: integer
              placementRef:
                description: LocalPlacementReference points to a same-namespace OCM
                  Placement.
                properties:
                  name:
                    description: Name is the referenced Placement name.
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              readyClusterCount:
                format: int32
                type: integer
              selectedClusterCount:
                format: int32
                type: integer
              staleClusterCount:
                format: int32
                type: integer
            type: object
        type: object
        x-kubernetes-validations:
        - message: exactly one of spec.placement or spec.placementRef is required
          rule: has(self.spec.placement) != has(self.spec.placementRef)
        - message: spec.managedServiceAccount.name is immutable
          rule: '!has(oldSelf.spec.managedServiceAccount.name) || self.spec.managedServiceAccount.name
            == oldSelf.spec.managedServiceAccount.name'
        - message: spec.managedServiceAccount.credentialPublication is immutable
          rule: '!has(oldSelf.spec.managedServiceAccount.credentialPublication) ||
            self.spec.managedServiceAccount.credentialPublication == oldSelf.spec.managedServiceAccount.credentialPublication'
        - message: spec.remotePermissions.enabled cannot be disabled after being enabled
          rule: '!has(oldSelf.spec.remotePermissions) || !oldSelf.spec.remotePermissions.enabled
            || (has(self.spec.remotePermissions) && self.spec.remotePermissions.enabled)'
        - message: spec.remotePermissions.profileRefs is immutable after remote permissions
            are enabled
          rule: '!has(oldSelf.spec.remotePermissions) || !oldSelf.spec.remotePermissions.enabled
            || (has(self.spec.remotePermissions) && self.spec.remotePermissions.profileRefs
            == oldSelf.spec.remotePermissions.profileRefs)'
        - message: spec.remotePermissions.remoteServiceAccountNamespace is immutable
            after remote permissions are enabled
          rule: '!has(oldSelf.spec.remotePermissions) || !oldSelf.spec.remotePermissions.enabled
            || (has(self.spec.remotePermissions) && self.spec.remotePermissions.remoteServiceAccountNamespace
            == oldSelf.spec.remotePermissions.remoteServiceAccountNamespace)'
    served: true
    storage: true
    subresources:
      status: {}
