apiVersion: authentication.appthrust.io/v1alpha1
kind: ManagedServiceAccountReplicaSet
metadata:
  name: aws-workload-identity-operator
  namespace: appthrust-system
spec:
  placementRefs:
    - name: prod-clusters
      rolloutStrategy:
        type: Progressive
        progressive:
          maxConcurrency: 25%
          maxFailures: 1
          progressDeadline: 30m
  template:
    metadata:
      name: aws-workload-identity-operator
      namespace: open-cluster-management-managed-serviceaccount
      labels:
        team: platform
    spec:
      rotation:
        enabled: true
        validity: 8640h
  rbac:
    # These rules document the remote-cluster RBAC needed by
    # aws-workload-identity-operator when AWSWorkloadIdentityConfig/default uses
    # spec.type: SelfHostedIRSA and multicluster-runtime connects through this
    # ManagedServiceAccount.
    #
    # The operator writes only the self-hosted webhook runtime and workload
    # ServiceAccount IRSA annotations on the remote cluster. It does not read
    # Cluster API Cluster objects or remote kubeconfig Secrets.
    grants:
      # Runtime namespace for the remote aws-pod-identity-webhook installation.
      # This must match AWSWorkloadIdentityOperatorConfig/default
      # spec.selfHostedIRSA.webhookNamespace. The default is
      # aws-pod-identity-webhook.
      - id: webhook-runtime
        type: Role
        forEachNamespace:
          name: aws-pod-identity-webhook
        metadata:
          name: aws-workload-identity-operator-webhook-runtime
        rules:
          # controller-runtime caches these namespaced runtime objects so drift
          # can enqueue the local AWSWorkloadIdentityConfig owner.
          - apiGroups: [""]
            resources: ["secrets", "serviceaccounts", "services"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["apps"]
            resources: ["deployments"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["rbac.authorization.k8s.io"]
            resources: ["roles", "rolebindings"]
            verbs: ["get", "list", "watch"]

          # Create is separate because Kubernetes RBAC cannot restrict create
          # by resourceNames.
          - apiGroups: [""]
            resources: ["secrets", "serviceaccounts", "services"]
            verbs: ["create"]
          - apiGroups: ["apps"]
            resources: ["deployments"]
            verbs: ["create"]
          - apiGroups: ["rbac.authorization.k8s.io"]
            resources: ["roles", "rolebindings"]
            verbs: ["create"]

          # Managed namespaced runtime objects:
          # - Secret/pod-identity-webhook-ca
          # - Secret/pod-identity-webhook
          # - ServiceAccount/pod-identity-webhook
          # - Service/pod-identity-webhook
          # - Deployment/pod-identity-webhook
          # - Role/pod-identity-webhook
          # - RoleBinding/pod-identity-webhook
          - apiGroups: [""]
            resources: ["secrets"]
            resourceNames: ["pod-identity-webhook-ca", "pod-identity-webhook"]
            verbs: ["update", "delete"]
          - apiGroups: [""]
            resources: ["secrets"]
            resourceNames: ["pod-identity-webhook"]
            verbs: ["patch"]
          - apiGroups: [""]
            resources: ["serviceaccounts", "services"]
            resourceNames: ["pod-identity-webhook"]
            verbs: ["update", "delete"]
          - apiGroups: ["apps"]
            resources: ["deployments"]
            resourceNames: ["pod-identity-webhook"]
            verbs: ["update", "delete"]
          - apiGroups: ["rbac.authorization.k8s.io"]
            resources: ["roles", "rolebindings"]
            resourceNames: ["pod-identity-webhook"]
            verbs: ["update", "delete"]

      # Optional: only needed by hub-side remote IRSA consumers that reuse this
      # ManagedServiceAccount to request a projected token for a remote workload
      # ServiceAccount and then call STS AssumeRoleWithWebIdentity. The
      # aws-workload-identity-operator reconcilers themselves do not need
      # serviceaccounts/token.
      - id: workload-tokenrequest
        type: Role
        forEachNamespace:
          selector:
            matchLabels:
              workload-identity.appthrust.io/profile: aws
        metadata:
          name: aws-workload-identity-operator-tokenrequest
        rules:
          - apiGroups: [""]
            resources: ["serviceaccounts/token"]
            resourceNames: ["workload"]
            verbs: ["create"]
      - id: remote-runtime
        type: ClusterRole
        metadata:
          name: aws-workload-identity-operator-remote-runtime
        rules:
          # Remote ServiceAccounts are watched cluster-wide so annotation drift
          # and annotated ServiceAccount deletes can enqueue hub-local
          # AWSServiceAccountRole reconciliation. The operator patches only the
          # eks.amazonaws.com/* annotations it owns.
          - apiGroups: [""]
            resources: ["serviceaccounts"]
            verbs: ["get", "list", "watch", "patch"]

          # The self-hosted webhook namespace is created or labeled by the
          # operator and intentionally left in place on deletion.
          - apiGroups: [""]
            resources: ["namespaces"]
            verbs: ["list", "watch", "create"]
          - apiGroups: [""]
            resources: ["namespaces"]
            resourceNames: ["aws-pod-identity-webhook"]
            verbs: ["get", "update"]

          # Cluster-scoped webhook runtime objects. Create and list/watch cannot
          # be constrained by resourceNames, so admission policy should enforce
          # narrower names if the platform requires it.
          - apiGroups: ["rbac.authorization.k8s.io"]
            resources: ["clusterroles", "clusterrolebindings"]
            verbs: ["list", "watch", "create"]
          - apiGroups: ["rbac.authorization.k8s.io"]
            resources: ["clusterroles", "clusterrolebindings"]
            resourceNames: ["pod-identity-webhook"]
            verbs: ["get", "update", "delete"]
          - apiGroups: ["admissionregistration.k8s.io"]
            resources: ["mutatingwebhookconfigurations"]
            verbs: ["list", "watch", "create"]
          - apiGroups: ["admissionregistration.k8s.io"]
            resources: ["mutatingwebhookconfigurations"]
            resourceNames: ["pod-identity-webhook"]
            verbs: ["get", "update", "delete"]

          # Kubernetes blocks creation of RBAC objects that grant permissions
          # the caller does not already hold unless the caller also has
          # escalate/bind. The managed ServiceAccount therefore needs the exact
          # extra permissions that the operator writes into the remote
          # pod-identity-webhook ClusterRole. The controller does not call the
          # CSR API directly.
          - apiGroups: ["certificates.k8s.io"]
            resources: ["certificatesigningrequests"]
            verbs: ["create", "get", "list", "watch"]
