apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ocm-managed-serviceaccount-set-operator
rules:
  - apiGroups:
      - authentication.appthrust.io
    resources:
      - managedserviceaccountsets
      - managedserviceaccountsets/finalizers
      - managedserviceaccountsets/status
    verbs:
      - get
      - list
      - watch
      - patch
      - update
  - apiGroups:
      - cluster.open-cluster-management.io
    resources:
      - managedclusters
      - managedclustersets
      - placementdecisions
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - cluster.open-cluster-management.io
    resources:
      - placements
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - update
      - delete
  - apiGroups:
      - authentication.open-cluster-management.io
    resources:
      - managedserviceaccounts
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - update
      - delete
  - apiGroups:
      - work.open-cluster-management.io
    resources:
      - manifestworks
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - update
      - delete
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch

