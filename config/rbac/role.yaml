apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ocm-managed-serviceaccount-replicaset-controller
rules:
  - apiGroups:
      - authentication.appthrust.io
    resources:
      - managedserviceaccountreplicasets
    verbs:
      - get
      - list
      - watch
      - patch
  - apiGroups:
      - authentication.appthrust.io
    resources:
      - managedserviceaccountreplicasets/finalizers
      - managedserviceaccountreplicasets/status
    verbs:
      - patch
  - apiGroups:
      - cluster.open-cluster-management.io
    resources:
      - placements
      - placementdecisions
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - multicluster.x-k8s.io
    resources:
      - clusterprofiles
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - authentication.open-cluster-management.io
    resources:
      - managedserviceaccounts
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - delete
  - apiGroups:
      - work.open-cluster-management.io
    resources:
      - manifestworks
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
