apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "msars.fullname" . }}-leader-election
  namespace: {{ include "msars.namespace" . }}
  labels:
    {{- include "msars.labels" . | nindent 4 }}
  {{- with .Values.rbac.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - create
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "msars.fullname" . }}-leader-election
  namespace: {{ include "msars.namespace" . }}
  labels:
    {{- include "msars.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "msars.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "msars.serviceAccountName" . }}
    namespace: {{ include "msars.namespace" . }}
