apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "omsa.fullname" . }}
  labels:
    {{- include "omsa.labels" . | nindent 4 }}
  {{- with .Values.rbac.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
  - apiGroups:
      - authentication.appthrust.io
    resources:
      - managedserviceaccountsets
      - managedserviceaccountsets/finalizers
      - managedserviceaccountsets/status
    verbs:
      - get
      - list
      - watch
      - patch
      - update
  - apiGroups:
      - cluster.open-cluster-management.io
    resources:
      - managedclusters
      - managedclustersets
      - placementdecisions
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - cluster.open-cluster-management.io
    resources:
      - placements
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - update
      - delete
  - apiGroups:
      - authentication.open-cluster-management.io
    resources:
      - managedserviceaccounts
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - update
      - delete
  - apiGroups:
      - work.open-cluster-management.io
    resources:
      - manifestworks
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - update
      - delete
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "omsa.fullname" . }}
  labels:
    {{- include "omsa.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "omsa.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "omsa.serviceAccountName" . }}
    namespace: {{ include "omsa.namespace" . }}
