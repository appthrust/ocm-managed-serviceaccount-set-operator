global:
  imageRegistry: ""
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
commonLabels: {}
commonAnnotations: {}

image:
  registry: ghcr.io
  repository: appthrust/ocm-managed-serviceaccount-set-operator
  tag: "0.1.0"
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

replicaCount: 1
revisionHistoryLimit: 10

operator:
  leaderElection:
    enabled: true
  extraArgs: []

serviceAccount:
  create: true
  name: ""
  annotations: {}
  labels: {}

rbac:
  annotations: {}

metrics:
  containerPort: 8080
  service:
    enabled: false
    type: ClusterIP
    port: 8080
    annotations: {}

serviceMonitor:
  enabled: false
  namespace: ""
  labels: {}
  annotations: {}
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  scheme: http
  honorLabels: false

containerPorts:
  health: 8081

livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

podSecurityContext:
  enabled: true
  fsGroup: 65532
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  enabled: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532

podLabels: {}
podAnnotations: {}
podAutomountServiceAccountToken: true
deploymentAnnotations: {}
priorityClassName: ""
schedulerName: ""
terminationGracePeriodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""
extraVolumeMounts: []
extraVolumes: []
initContainers: []
sidecars: []
