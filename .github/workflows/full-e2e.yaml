name: Full OCM e2e

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  e2e:
    name: Hub and two-spoke kind e2e
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout controller
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout clusteradm
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: open-cluster-management-io/clusteradm
          ref: v1.2.2-rc.1
          path: .e2e/clusteradm

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install Kubernetes e2e tools
        env:
          KUBECTL_VERSION: v1.35.3
          KIND_VERSION: v0.31.0
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -fsSLo "${RUNNER_TEMP}/bin/kubectl" "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          curl -fsSLo "${RUNNER_TEMP}/kubectl.sha256" "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
          echo "$(cat "${RUNNER_TEMP}/kubectl.sha256")  ${RUNNER_TEMP}/bin/kubectl" | sha256sum --check
          chmod +x "${RUNNER_TEMP}/bin/kubectl"
          GOBIN="${RUNNER_TEMP}/bin" go install "sigs.k8s.io/kind@${KIND_VERSION}"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Download Go modules
        run: GOWORK=off go mod download

      - name: Run full e2e
        env:
          CLUSTERADM_REPO: ${{ github.workspace }}/.e2e/clusteradm
          PRESERVE_E2E_ON_FAILURE: "false"
        run: make test-e2e
