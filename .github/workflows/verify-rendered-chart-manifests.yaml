name: Verify rendered chart manifests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    name: Render chart and test manifest shape
    runs-on: ubuntu-latest
    steps:
      - name: Checkout operator
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install Node dependencies
        run: bun install --frozen-lockfile

      - name: Lint Helm chart
        run: make helm-lint

      - name: Template default values
        run: make helm-template >/tmp/omsa-default.yaml

      - name: Template test values
        run: make helm-template-test >/tmp/omsa-test.yaml

      - name: Run kest chart tests
        run: make test-kest

      - name: Package chart
        run: helm package charts/ocm-managed-serviceaccount-set-operator --destination /tmp/charts
