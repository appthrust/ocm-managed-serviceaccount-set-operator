name: Verify controller source

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    name: Test, vet, and verify guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout controller
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: make test

      - name: Run golangci-lint
        run: make lint

      - name: Verify static guardrails
        run: make verify-static

      - name: Verify generated artifacts
        run: make verify-generated
