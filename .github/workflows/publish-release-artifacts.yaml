name: Publish release artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ocm-managed-serviceaccount-set-operator
  CHART_DIR: charts/ocm-managed-serviceaccount-set-operator

jobs:
  tagpr:
    name: Prepare release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      tagpr-tag: ${{ steps.run-tagpr.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: run-tagpr
        name: Run tagpr
        uses: Songmu/tagpr@9bbb945b2fb025126186661e27d55485e3fc6df6 # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    name: Validate release chart
    needs: tagpr
    if: needs.tagpr.outputs.tagpr-tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.tagpr.outputs.tagpr-tag }}

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Lint default values
        run: helm lint "${CHART_DIR}"

      - name: Lint test values
        run: helm lint "${CHART_DIR}" --values "${CHART_DIR}/values.test.yaml"

      - name: Template default values
        run: |
          helm template "${IMAGE_NAME}" "${CHART_DIR}" \
            --namespace ocm-managed-serviceaccount-set-operator-system \
            --hide-notes >/tmp/omsa-default.yaml

      - name: Template test values
        run: |
          helm template "${IMAGE_NAME}" "${CHART_DIR}" \
            --namespace ocm-managed-serviceaccount-set-operator-system \
            --values "${CHART_DIR}/values.test.yaml" \
            --hide-notes >/tmp/omsa-test.yaml

      - name: Package Helm chart
        run: helm package "${CHART_DIR}" --destination /tmp/charts

  operator-image:
    name: Publish operator image
    needs: [tagpr, validate]
    if: needs.tagpr.outputs.tagpr-tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.tagpr.outputs.tagpr-tag }}

      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          TAG: ${{ needs.tagpr.outputs.tagpr-tag }}
          OWNER: ${{ github.repository_owner }}
        run: |
          version="${TAG#v}"
          major_minor="${version%.*}"
          image="${REGISTRY}/${OWNER,,}/${IMAGE_NAME}"
          has_major_minor=false
          if [[ "${major_minor}" != "${version}" ]]; then
            has_major_minor=true
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${major_minor}" >> "$GITHUB_OUTPUT"
          echo "has_major_minor=${has_major_minor}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.release.outputs.image }}
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=${{ steps.release.outputs.major_minor }},enable=${{ steps.release.outputs.has_major_minor }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        with:
          cosign-release: v2.6.3

      - name: Sign image
        env:
          IMAGE: ${{ steps.release.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes --recursive "${IMAGE}@${DIGEST}"

  helm-chart:
    name: Publish Helm chart
    needs: [tagpr, validate, operator-image]
    if: needs.tagpr.outputs.tagpr-tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.tagpr.outputs.tagpr-tag }}

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Resolve chart metadata
        id: chart
        shell: bash
        env:
          TAG: ${{ needs.tagpr.outputs.tagpr-tag }}
          OWNER: ${{ github.repository_owner }}
        run: |
          version="${TAG#v}"
          owner="${OWNER,,}"
          repository="${owner}/${IMAGE_NAME}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "repository=${repository}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR Helm registry
        env:
          HELM_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: echo "${HELM_PASSWORD}" | helm registry login "${REGISTRY}" -u "${GHCR_USER}" --password-stdin

      - name: Log in to GHCR for Cosign
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update chart image repository
        run: |
          sed -Ei "s|^([[:space:]]+repository: ).*$|\\1${{ steps.chart.outputs.repository }}|" "${CHART_DIR}/values.yaml"

      - name: Lint Helm chart
        run: helm lint "${CHART_DIR}"

      - name: Package Helm chart
        run: |
          helm package "${CHART_DIR}" \
            --version "${{ steps.chart.outputs.version }}" \
            --app-version "${{ steps.chart.outputs.version }}"

      - name: Push Helm chart
        id: push-chart
        shell: bash
        run: |
          chart_repository="${REGISTRY}/${{ steps.chart.outputs.owner }}/helm-charts/${IMAGE_NAME}"
          push_output="$(helm push "${IMAGE_NAME}-${{ steps.chart.outputs.version }}.tgz" "oci://${REGISTRY}/${{ steps.chart.outputs.owner }}/helm-charts" 2>&1)"
          printf '%s\n' "${push_output}"
          digest="$(awk '/^Digest:/ {print $2}' <<<"${push_output}" | tail -n1)"
          if [[ -z "${digest}" ]]; then
            echo "failed to resolve pushed chart digest" >&2
            exit 1
          fi
          echo "repository=${chart_repository}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Set up Cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        with:
          cosign-release: v2.6.3

      - name: Sign Helm chart
        env:
          CHART_REPOSITORY: ${{ steps.push-chart.outputs.repository }}
          DIGEST: ${{ steps.push-chart.outputs.digest }}
        run: cosign sign --yes "${CHART_REPOSITORY}@${DIGEST}"

